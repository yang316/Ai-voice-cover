name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            ffmpeg

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Prepare sidecar
        run: |
          SIDECAr_DIR="src-tauri/sidecar"
          rm -rf "$SIDECAr_DIR"
          mkdir -p "$SIDECAr_DIR"

          cp scripts/sidecar-launcher.py "$SIDECAr_DIR/"
          cp scripts/requirements.txt "$SIDECAr_DIR/"
          cp scripts/requirements-ml.txt "$SIDECAr_DIR/"
          cp -r backend "$SIDECAr_DIR/backend"
          mkdir -p "$SIDECAr_DIR/frontend-vue"
          cp -r frontend-vue/dist "$SIDECAr_DIR/frontend-vue/dist"

          echo "Sidecar prepared:"
          find "$SIDECAr_DIR" -maxdepth 2 -type f | head -20

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Prepare sidecar
        run: |
          SIDECAr_DIR="src-tauri/sidecar"
          rm -rf "$SIDECAr_DIR"
          mkdir -p "$SIDECAr_DIR"

          cp scripts/sidecar-launcher.py "$SIDECAr_DIR/"
          cp scripts/requirements.txt "$SIDECAr_DIR/"
          cp scripts/requirements-ml.txt "$SIDECAr_DIR/"
          cp -r backend "$SIDECAr_DIR/backend"
          mkdir -p "$SIDECAr_DIR/frontend-vue"
          cp -r frontend-vue/dist "$SIDECAr_DIR/frontend-vue/dist"

          echo "Sidecar prepared"

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Download embedded Python
        run: |
          PYTHON_VERSION="3.11.9"
          PYTHON_URL="https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-embed-amd64.zip"
          PYTHON_DIR="src-tauri/sidecar/python"
          mkdir -p "$PYTHON_DIR"

          curl -L -o /tmp/python-embed.zip "$PYTHON_URL"
          unzip -q -o /tmp/python-embed.zip -d "$PYTHON_DIR"
          rm /tmp/python-embed.zip

          # Enable pip (uncomment import site)
          sed -i 's/#import site/import site/' "$PYTHON_DIR/python311._pth"

          echo "Embedded Python $PYTHON_VERSION ready"
          ls "$PYTHON_DIR/python.exe"

      - name: Prepare sidecar
        run: |
          SIDECAr_DIR="src-tauri/sidecar"

          cp scripts/sidecar-launcher.py "$SIDECAr_DIR/"
          cp scripts/requirements.txt "$SIDECAr_DIR/"
          cp scripts/requirements-ml.txt "$SIDECAr_DIR/"
          cp -r backend "$SIDECAr_DIR/backend"
          mkdir -p "$SIDECAr_DIR/frontend-vue"
          cp -r frontend-vue/dist "$SIDECAr_DIR/frontend-vue/dist"

          echo "Sidecar prepared"
          ls "$SIDECAr_DIR/"

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-appimage/*.AppImage
            linux-deb/*.deb
            macos-dmg/*.dmg
            windows-msi/*.msi
            windows-nsis/*.exe
