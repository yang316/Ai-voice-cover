name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Update tauri.conf.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          # Update Cargo.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            ffmpeg

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Install Python deps
        run: |
          pip install fastapi "uvicorn[standard]" "celery[redis]" redis pydantic pydantic-settings \
            python-multipart httpx soundfile numpy pyinstaller

      - name: Build Python sidecar
        run: |
          pyinstaller --onefile \
            --name ai-voice-cover-server \
            --add-data backend:backend \
            --add-data "frontend-vue/dist:frontend-vue/dist" \
            --collect-submodules backend \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import pydantic \
            --hidden-import pydantic_settings \
            --hidden-import httpx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import redis \
            --hidden-import celery \
            --hidden-import multipart \
            --hidden-import sqlite3 \
            --collect-submodules sqlite3 \
            scripts/sidecar-launcher.py
          mkdir -p src-tauri/sidecar
          cp dist/ai-voice-cover-server src-tauri/sidecar/ai-voice-cover-server-x86_64-unknown-linux-gnu

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Install Python deps
        run: |
          pip install fastapi "uvicorn[standard]" "celery[redis]" redis pydantic pydantic-settings \
            python-multipart httpx soundfile numpy pyinstaller

      - name: Build Python sidecar
        run: |
          pyinstaller --onefile \
            --name ai-voice-cover-server \
            --add-data backend:backend \
            --add-data "frontend-vue/dist:frontend-vue/dist" \
            --collect-submodules backend \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import pydantic \
            --hidden-import pydantic_settings \
            --hidden-import httpx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import redis \
            --hidden-import celery \
            --hidden-import multipart \
            --hidden-import sqlite3 \
            --collect-submodules sqlite3 \
            scripts/sidecar-launcher.py
          mkdir -p src-tauri/sidecar
          cp dist/ai-voice-cover-server src-tauri/sidecar/ai-voice-cover-server-aarch64-apple-darwin

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "Version set to $VERSION"

      - name: Build frontend
        run: |
          cd frontend-vue
          npm ci
          npm run build

      - name: Install Python deps
        run: |
          pip install fastapi "uvicorn[standard]" "celery[redis]" redis pydantic pydantic-settings \
            python-multipart httpx soundfile numpy pyinstaller

      - name: Build Python sidecar
        run: |
          pyinstaller --onefile \
            --name ai-voice-cover-server \
            --add-data "backend;backend" \
            --add-data "frontend-vue/dist;frontend-vue/dist" \
            --collect-submodules backend \
            --hidden-import fastapi \
            --hidden-import fastapi.middleware.cors \
            --hidden-import fastapi.staticfiles \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import pydantic \
            --hidden-import pydantic_settings \
            --hidden-import httpx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import redis \
            --hidden-import celery \
            --hidden-import multipart \
            --hidden-import sqlite3 \
            --collect-submodules sqlite3 \
            scripts/sidecar-launcher.py
          mkdir -p src-tauri/sidecar
          cp dist/ai-voice-cover-server.exe src-tauri/sidecar/ai-voice-cover-server-x86_64-pc-windows-msvc.exe

      - name: Install Node.js deps
        run: npm install

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-appimage/*.AppImage
            linux-deb/*.deb
            macos-dmg/*.dmg
            windows-msi/*.msi
            windows-nsis/*.exe
